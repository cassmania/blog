<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丕刀卜己卜人丨廿卜 — 블로그</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <a href="#/" class="logo">丕刀卜己卜人丨廿卜</a>
  <nav class="main-nav">
    <a href="#/" data-nav="home">홈</a>
    <a href="#/board" data-nav="board">게시판</a>
    <a href="#/write" data-nav="write" class="btn-write admin-only" hidden>글쓰기</a>
    <a href="#/settings" data-nav="settings" class="admin-only" hidden>설정</a>
    <a href="#" id="btn-admin" class="admin-link">관리자</a>
  </nav>
</header>

<main id="app"></main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-top">
      <p class="footer-tagline">덜어내는 것에 집중합니다.<br>글과 사진, 그리고 여백만 남도록.</p>
      <nav class="footer-nav">
        <a href="#/">홈</a>
        <a href="#/board">게시판</a>
      </nav>
    </div>
    <p class="footer-wordmark">丕刀卜己卜人丨廿卜</p>
    <span class="footer-copy">© 2026 丕刀卜己卜人丨廿卜. Built with intention.</span>
  </div>
</footer>

<!-- ===== 템플릿 ===== -->

<template id="tpl-home">
  <section class="hero-full">
    <img src="https://picsum.photos/seed/athen-hero/1920/900" alt="" loading="eager" data-slot="hero">
    <div class="hero-overlay">
      <p class="hero-eyebrow">A PERSONAL ARCHIVE</p>
      <h1>기록은 <em class="hero-em">생각</em>을<br>단단하게 만든다</h1>
      <a href="#/board" class="btn-pill">글 둘러보기</a>
    </div>
  </section>

  <section class="intro-split">
    <span class="intro-label">THE ARCHIVE</span>
    <p class="intro-text">이곳은 흘러가는 것들을 붙잡아 두는 공간입니다. 일상과 공부, 프로젝트의 기록이 쌓여 하나의 아카이브가 됩니다. 불필요한 것을 덜어내고, 글과 사진에만 집중합니다.</p>
  </section>

<section class="alt-row">
    <div class="alt-media"><img src="https://picsum.photos/seed/athen-write/1000/750" alt="" loading="lazy" data-slot="feature1"></div>
    <div class="alt-body">
      <span class="feature-num">01 — 기록</span>
      <h2>짧아도 좋고,<br>길어도 좋습니다</h2>
      <p>리치텍스트 에디터와 HTML 모드, 사진 첨부까지. 형식에 얽매이지 않고 그날의 생각을 그대로 남깁니다.</p>
    </div>
  </section>

  <section class="alt-row alt-reverse">
    <div class="alt-media"><img src="https://picsum.photos/seed/athen-talk/1000/750" alt="" loading="lazy" data-slot="feature2"></div>
    <div class="alt-body">
      <span class="feature-num">02 — 대화</span>
      <h2>사진과 함께<br>생각을 나눕니다</h2>
      <p>누구나 댓글에 사진을 첨부해 순간을 공유할 수 있습니다. 조용히 남기고 싶다면 비밀댓글로 — 암호화되어 저장됩니다.</p>
    </div>
  </section>

  <section class="interstitial">
    <img src="https://picsum.photos/seed/athen-band/1920/700" alt="" loading="lazy" data-slot="band">
    <p class="interstitial-quote">여백을 껴안고,<br>단순함 속에서 명료함을 찾다.</p>
  </section>

  <section class="pillar-strip">
    <div class="pillar">
      <svg class="pillar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <h3>게시판</h3>
      <p>주제별 게시판으로 글을 분류해 나중에 다시 찾기 쉽게.</p>
    </div>
    <div class="pillar">
      <svg class="pillar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <h3>사진 공유</h3>
      <p>글과 댓글 어디든 사진을 올려 순간을 함께 봅니다.</p>
    </div>
    <div class="pillar">
      <svg class="pillar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <h3>비밀댓글</h3>
      <p>AES 암호화 저장 — 비밀번호를 아는 사람만 열람.</p>
    </div>
    <div class="pillar">
      <svg class="pillar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
      <h3>승인제</h3>
      <p>모든 댓글은 관리자 승인 후 공개. 스팸은 자동 분류.</p>
    </div>
  </section>

  <section class="post-section" id="custom-pages-section" hidden>
    <div class="section-head">
      <h2 class="section-title">페이지</h2>
    </div>
    <div class="page-grid" id="custom-pages"></div>
  </section>

  <section class="post-section">
    <div class="section-head">
      <h2 class="section-title">최근 글</h2>
      <a href="#/board" class="link-more">전체 보기 →</a>
    </div>
    <div class="card-grid" id="recent-posts"></div>
  </section>
</template>

<template id="tpl-page">
  <article class="post-view">
    <header class="post-header">
      <span class="post-category">페이지</span>
      <h1 id="page-title"></h1>
      <div class="post-meta">
        <time id="page-date"></time>
        <span class="meta-actions admin-only" hidden>
          <a href="#" id="btn-edit-page">수정</a>
          <a href="#" id="btn-delete-page">삭제</a>
        </span>
      </div>
    </header>
    <div class="post-content" id="page-content"></div>
  </article>
</template>

<template id="tpl-board">
  <div class="board-layout">
    <aside class="category-panel">
      <h3>게시판</h3>
      <ul id="category-list"></ul>
      <button type="button" id="btn-add-board" class="btn-add-board admin-only" hidden>+ 게시판 추가</button>
    </aside>
    <section class="board-main">
      <div class="board-toolbar">
        <h2 class="section-title" id="board-title">전체 글</h2>
        <input type="search" id="search-input" placeholder="검색어 입력">
      </div>
      <div class="post-list" id="board-posts"></div>
    </section>
  </div>
</template>

<template id="tpl-write">
  <section class="write-page">
    <h2 class="section-title" id="write-title">글쓰기</h2>
    <form id="write-form">
      <div class="field">
        <label for="post-title">제목</label>
        <input type="text" id="post-title" required placeholder="제목을 입력하세요">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="post-category">게시판</label>
          <input type="text" id="post-category" list="category-options" placeholder="예: 일상">
          <datalist id="category-options"></datalist>
        </div>
        <div class="field mode-field">
          <label>작성 모드</label>
          <div class="mode-toggle">
            <button type="button" id="mode-editor" class="active">에디터</button>
            <button type="button" id="mode-html">HTML</button>
          </div>
        </div>
      </div>
      <div class="field" id="editor-field">
        <label>본문</label>
        <div class="editor-toolbar">
          <button type="button" data-cmd="bold"><b>B</b></button>
          <button type="button" data-cmd="italic"><i>I</i></button>
          <button type="button" data-cmd="underline"><u>U</u></button>
          <button type="button" data-cmd="strikeThrough"><s>S</s></button>
          <button type="button" data-cmd="insertUnorderedList">• 목록</button>
          <button type="button" data-cmd="formatBlock" data-value="h2">제목</button>
          <button type="button" data-cmd="formatBlock" data-value="blockquote">인용</button>
          <button type="button" id="btn-image">이미지 URL</button>
          <button type="button" id="btn-photo"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> 사진 첨부</button>
          <input type="file" id="photo-input" accept="image/*" multiple hidden>
        </div>
        <div id="editor" class="editor" contenteditable="true"></div>
      </div>
      <div class="field" id="html-field" hidden>
        <label for="html-source">HTML 소스 (붙여넣기 가능)</label>
        <textarea id="html-source" rows="16" placeholder="&lt;p&gt;HTML 코드를 직접 붙여넣으세요&lt;/p&gt;"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">발행</button>
        <a href="#/board" class="btn-secondary">취소</a>
      </div>
    </form>
  </section>
</template>

<template id="tpl-settings">
  <section class="settings-page">
    <h2 class="section-title">화면 설정</h2>
    <p class="settings-note">홈 화면의 사진과 등장 효과를 변경합니다. 저장하면 바로 반영됩니다.</p>
    <div id="slot-list"></div>

    <h2 class="section-title settings-sub">페이지 관리</h2>
    <p class="settings-note">자유 페이지를 만들어 홈 화면에 노출합니다. 개수 제한이 없습니다.</p>
    <div id="page-manage-list"></div>
    <button type="button" id="btn-new-page" class="btn-attach">+ 새 페이지</button>

    <h2 class="section-title settings-sub">게시판 등장 효과</h2>
    <p class="settings-note">게시판마다 글 목록이 나타나는 방식을 고릅니다. 미리보기를 눌러 직접 확인하세요.</p>
    <div id="board-fx-list"></div>

    <div class="form-actions">
      <button type="button" id="btn-save-settings" class="btn-primary">저장</button>
      <button type="button" id="btn-reset-settings" class="btn-secondary">기본값으로</button>
    </div>
  </section>
</template>

<template id="tpl-post">
  <article class="post-view">
    <header class="post-header">
      <span class="post-category" id="view-category"></span>
      <h1 id="view-title"></h1>
      <div class="post-meta">
        <time id="view-date"></time>
        <span class="meta-actions admin-only" hidden>
          <a href="#" id="btn-edit-post">수정</a>
          <a href="#" id="btn-delete-post">삭제</a>
        </span>
      </div>
    </header>
    <div class="post-content" id="view-content"></div>
    <section class="comments">
      <h3>댓글 <span id="comment-count"></span></h3>
      <p class="comment-notice">댓글은 관리자 승인 후 공개됩니다.</p>
      <ul id="comment-list"></ul>
      <form id="comment-form">
        <div class="field-row">
          <input type="text" id="comment-name" placeholder="이름" required>
          <input type="password" id="comment-pw" placeholder="비밀번호" required>
        </div>
        <textarea id="comment-body" rows="3" placeholder="댓글을 입력하세요" required></textarea>
        <div id="comment-photo-preview" class="comment-photo-preview" hidden>
          <img alt="첨부 사진 미리보기">
          <button type="button" id="btn-remove-photo" title="사진 제거">×</button>
        </div>
        <div class="comment-form-footer">
          <span class="comment-form-left">
            <button type="button" id="btn-comment-photo" class="btn-attach"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> 사진</button>
            <input type="file" id="comment-photo-input" accept="image/*" hidden>
            <label class="secret-label">
              <input type="checkbox" id="comment-secret"> 비밀댓글 (암호화 저장)
            </label>
          </span>
          <button type="submit" class="btn-primary">등록</button>
        </div>
      </form>
    </section>
  </article>
</template>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.58.0/dist/umd/supabase.min.js" integrity="sha384-WmjsOVSSw3JNqIKfmDU35+uddOzBdP9PlYIWCg7xdnVOesjWVGpRcooOVheFFwH4" crossorigin="anonymous"></script>
<script src="js/app.js"></script>
</body>
</html>
