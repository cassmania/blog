name: DB 백업

on:
  schedule:
    - cron: '0 18 * * *' # 매일 03:00 KST
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Supabase 테이블 덤프
        env:
          KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          set -e
          mkdir -p backup
          for t in posts comments boards custom_pages; do
            curl -sf "https://uarrnlbgowejwulzixqm.supabase.co/rest/v1/${t}?select=*&order=created_at" \
              -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" \
              | python3 -m json.tool > "backup/${t}.json"
          done
          curl -sf "https://uarrnlbgowejwulzixqm.supabase.co/rest/v1/settings?select=*&order=key" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" \
            | python3 -m json.tool > "backup/settings.json"

      - name: 변경 시 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup
          git diff --cached --quiet || { git commit -m "backup: $(date -u +%Y-%m-%d)"; git push; }
